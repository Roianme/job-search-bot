app = "job-alert-bot"
primary_region = "syd"

[build]
  # Uses the Dockerfile in the project root

[env]
  NODE_ENV = "production"
  DB_PATH = "/data/jobs.db"

[mounts]
  source      = "job_data"
  destination = "/data"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

[checks]
  [checks.alive]
    type    = "tcp"
    port    = 8080
    grace_period = "5s"
    interval = "30s"
    timeout  = "2s"
